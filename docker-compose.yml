services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskchain-db
    environment:
      POSTGRES_USER: taskchain
      POSTGRES_PASSWORD: taskchain
      POSTGRES_DB: taskchain
    ports:
      - "5433:5432"       # 5433 on host to avoid conflicts with local Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskchain"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Express API — port 3005 ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskchain-api
    command: >
      sh -c "npx prisma migrate deploy &&
             npx ts-node api/index.ts"
    ports:
      - "3005:3005"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://taskchain:taskchain@db:5432/taskchain
      RUNNER_URL: http://runner:4000
      PORT: "3005"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    restart: unless-stopped

  # ── Agent Runner — port 4000 ────────────────────────────────────────────────
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskchain-runner
    command: ["npx", "ts-node", "agents/runner/index.ts"]
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://taskchain:taskchain@db:5432/taskchain
      RUNNER_PORT: "4000"
      PAYMENT_FACILITATOR_URL: http://facilitator:4021
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    restart: unless-stopped

  # ── x402 Facilitator — port 4021 ───────────────────────────────────────────
  facilitator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskchain-facilitator
    command: ["npx", "ts-node", "x402/facilitator.ts"]
    ports:
      - "4021:4021"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4021/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── Next.js Frontend — port 3010 ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time.
        # NEXT_PUBLIC_API_URL must be the URL your *browser* can reach (not Docker-internal).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3005}
        NEXT_PUBLIC_PRIVY_APP_ID: ${NEXT_PUBLIC_PRIVY_APP_ID:-}
        NEXT_PUBLIC_FUJI_RPC_URL: ${NEXT_PUBLIC_FUJI_RPC_URL:-https://api.avax-test.network/ext/bc/C/rpc}
        NEXT_PUBLIC_ESCROW_ADDRESS: ${NEXT_PUBLIC_ESCROW_ADDRESS:-}
        NEXT_PUBLIC_TASK_TOKEN_ADDRESS: ${NEXT_PUBLIC_TASK_TOKEN_ADDRESS:-}
        NEXT_PUBLIC_TASK_STAKING_ADDRESS: ${NEXT_PUBLIC_TASK_STAKING_ADDRESS:-}
    container_name: taskchain-frontend
    ports:
      - "3010:3010"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3010"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres_data:
